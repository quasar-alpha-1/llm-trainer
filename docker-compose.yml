version: '3.8'

services:
  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: docker/api-gateway.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app/backend
      - ./core:/app/core
    depends_on:
      - postgres
      - minio
    networks:
      - train-platform

  # PostgreSQL Database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: train_platform
      POSTGRES_USER: train_user
      POSTGRES_PASSWORD: train_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - train-platform

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - train-platform

  # Redis (for caching and job queues)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - train-platform

  # Prometheus (monitoring)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - train-platform

  # Grafana (monitoring dashboard)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - train-platform

  # Training Service (GPU-enabled)
  trainer-service:
    build:
      context: .
      dockerfile: docker/trainer-service.Dockerfile
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    volumes:
      - ./core:/app/core
      - ./backend:/app/backend
      - model_outputs:/app/outputs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - postgres
      - minio
    networks:
      - train-platform

  # Agent Service (AI co-pilot)
  agent-service:
    build:
      context: .
      dockerfile: docker/agent-service.Dockerfile
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    volumes:
      - ./core:/app/core
      - ./backend:/app/backend
    depends_on:
      - postgres
      - redis
    networks:
      - train-platform

  # Dataset Service
  dataset-service:
    build:
      context: .
      dockerfile: docker/dataset-service.Dockerfile
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    volumes:
      - ./core:/app/core
      - ./backend:/app/backend
      - dataset_cache:/app/cache
    depends_on:
      - postgres
      - minio
    networks:
      - train-platform

volumes:
  postgres_data:
  minio_data:
  redis_data:
  prometheus_data:
  grafana_data:
  model_outputs:
  dataset_cache:

networks:
  train-platform:
    driver: bridge